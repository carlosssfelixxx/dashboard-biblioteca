<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Monitor Ambiental</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="https://cdn.imgchest.com/files/7e0fc8673dc1.png">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div>
        <div class="login-logo-text">Monitor Ambiental</div>
        <div class="login-logo-sub">QualiTrack</div>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@biblioteca.mx" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      Iniciar sesión
    </button>

    <div class="error-msg" id="error-msg"></div>

  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  // Si ya hay sesión activa, redirigir al dashboard
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });

  async function handleLogin() {
    const btn   = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;

    errEl.classList.remove('show');
    btn.textContent = 'Iniciando sesión…';
    btn.disabled = true;

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });

    if (error) {
      errEl.textContent = 'Credenciales incorrectas. Intenta de nuevo.';
      errEl.classList.add('show');
      btn.textContent = 'Iniciar sesión';
      btn.disabled = false;
      return;
    }

    window.location.href = 'dashboard.html';
  }

  // Permitir Enter para enviar
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
